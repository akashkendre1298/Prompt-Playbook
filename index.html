<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prompt Playbook — Engineer Edition</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --surface: #14171c;
    --surface2: #1c2028;
    --surface3: #232830;
    --border: #2a2f3a;
    --border2: #343c4a;
    --text: #e8eaf0;
    --text2: #8f96a8;
    --text3: #555d6e;
    --accent-prod: #4f8ef7;
    --accent-prod-bg: #0e1e3a;
    --accent-code: #3ecf8e;
    --accent-code-bg: #0a2018;
    --accent-creative: #b787f5;
    --accent-creative-bg: #1a0e2e;
    --accent-craft: #f5a623;
    --accent-craft-bg: #2a1a04;
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  .site-header {
    padding: 48px 40px 36px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0a0c0f 0%, var(--bg) 100%);
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(79,142,247,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .site-header::after {
    content: '';
    position: absolute;
    top: -30px; right: 80px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(183,135,245,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }
  .header-title {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 10px;
  }
  .header-title span { color: var(--accent-prod); }
  .header-sub {
    font-size: 14px;
    color: var(--text2);
    font-weight: 400;
    max-width: 480px;
    line-height: 1.6;
  }
  .header-stats {
    display: flex;
    gap: 24px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .stat-pill {
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    color: var(--text2);
    background: var(--surface);
  }

  /* ── CONTROLS ── */
  .controls {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
  }
  .search-wrap input {
    width: 100%;
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 14px 9px 36px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-wrap input:focus { border-color: var(--accent-prod); }

  .tab-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab-btn {
    font-family: var(--display);
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
  .tab-btn.active-all { background: var(--text); color: var(--bg); border-color: transparent; }
  .tab-btn.active-prod { background: var(--accent-prod-bg); color: var(--accent-prod); border-color: var(--accent-prod); }
  .tab-btn.active-code { background: var(--accent-code-bg); color: var(--accent-code); border-color: var(--accent-code); }
  .tab-btn.active-creative { background: var(--accent-creative-bg); color: var(--accent-creative); border-color: var(--accent-creative); }
  .tab-btn.active-craft { background: var(--accent-craft-bg); color: var(--accent-craft); border-color: var(--accent-craft); }

  /* ── MAIN ── */
  .main { padding: 32px 40px 60px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    margin-top: 32px;
  }
  .section-header:first-child { margin-top: 0; }
  .section-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-prod { background: var(--accent-prod); }
  .dot-code { background: var(--accent-code); }
  .dot-creative { background: var(--accent-creative); }
  .dot-craft { background: var(--accent-craft); }
  .section-name {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .section-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-left: auto;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  /* ── CARDS ── */
  .prompt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color 0.15s, background 0.15s;
    cursor: default;
  }
  .prompt-card:hover { border-color: var(--border2); background: var(--surface2); }

  .card-header { display: flex; align-items: flex-start; gap: 12px; }
  .card-icon {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    font-family: var(--mono);
    font-weight: 500;
  }
  .icon-prod { background: var(--accent-prod-bg); color: var(--accent-prod); border: 1px solid rgba(79,142,247,0.2); }
  .icon-code { background: var(--accent-code-bg); color: var(--accent-code); border: 1px solid rgba(62,207,142,0.2); }
  .icon-creative { background: var(--accent-creative-bg); color: var(--accent-creative); border: 1px solid rgba(183,135,245,0.2); }
  .icon-craft { background: var(--accent-craft-bg); color: var(--accent-craft); border: 1px solid rgba(245,166,35,0.2); }

  .card-meta { flex: 1; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
  .card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }

  /* Prompt template box */
  .prompt-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text2);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 140px;
    overflow: hidden;
    position: relative;
    transition: max-height 0.3s ease;
  }
  .prompt-box.expanded { max-height: 600px; }
  .prompt-box .var { color: var(--accent-craft); font-style: italic; }
  .prompt-box::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 36px;
    background: linear-gradient(to bottom, transparent, var(--bg));
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .prompt-box.expanded::after { opacity: 0; }

  /* Examples section */
  .examples-section { display: none; flex-direction: column; gap: 10px; }
  .examples-section.visible { display: flex; }
  .examples-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    padding-bottom: 2px;
    border-bottom: 1px solid var(--border);
  }
  .example-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .ex-input-block {
    padding: 10px 12px 8px;
    border-bottom: 1px dashed var(--border);
  }
  .ex-output-block {
    padding: 10px 12px;
    background: var(--bg);
  }
  .ex-row-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .ex-row-label.input-lbl { color: var(--accent-craft); }
  .ex-row-label.output-lbl { color: var(--accent-code); }
  .ex-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .ex-dot-input { background: var(--accent-craft); }
  .ex-dot-output { background: var(--accent-code); }
  .ex-text {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.65;
    font-family: var(--mono);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .ex-copy-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    margin-left: auto;
    transition: all 0.15s;
  }
  .ex-copy-btn:hover { color: var(--text); border-color: var(--border2); }

  /* Card footer */
  .card-footer {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 99px;
    border: 1px solid;
  }
  .badge-prod { color: var(--accent-prod); border-color: rgba(79,142,247,0.3); background: var(--accent-prod-bg); }
  .badge-code { color: var(--accent-code); border-color: rgba(62,207,142,0.3); background: var(--accent-code-bg); }
  .badge-creative { color: var(--accent-creative); border-color: rgba(183,135,245,0.3); background: var(--accent-creative-bg); }
  .badge-craft { color: var(--accent-craft); border-color: rgba(245,166,35,0.3); background: var(--accent-craft-bg); }

  .action-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }
  .action-btn.copied { color: var(--accent-code); border-color: var(--accent-code); }
  .toggle-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .toggle-btn:hover { color: var(--text2); border-color: var(--border2); }
  .ml-auto { margin-left: auto; }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 13px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  @media (max-width: 640px) {
    .site-header { padding: 32px 20px 24px; }
    .controls { padding: 14px 20px; }
    .main { padding: 24px 20px 40px; }
    .header-title { font-size: 26px; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <p class="header-eyebrow">v2.0 — engineer edition</p>
  <h1 class="header-title">Prompt <span>Playbook</span></h1>
  <p class="header-sub">A curated arsenal of battle-tested prompts for prompt engineers, developers, and vibe coders. Copy → fill in brackets → fire.</p>
  <div class="header-stats">
    <span class="stat-pill">33 prompts</span>
    <span class="stat-pill">4 categories</span>
    <span class="stat-pill">90+ real examples</span>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#e8eaf0" stroke-width="1.2"/><path d="M9.5 9.5L12 12" stroke="#e8eaf0" stroke-width="1.2" stroke-linecap="round"/></svg>
    <input type="text" id="search" placeholder="Search prompts..." oninput="render()" />
  </div>
  <div class="tab-row">
    <button class="tab-btn active-all" data-tab="all" onclick="setTab(this,'active-all')">All</button>
    <button class="tab-btn" data-tab="productivity" onclick="setTab(this,'active-prod')">Work &amp; productivity</button>
    <button class="tab-btn" data-tab="coding" onclick="setTab(this,'active-code')">Coding &amp; tech</button>
    <button class="tab-btn" data-tab="creative" onclick="setTab(this,'active-creative')">Creative projects</button>
    <button class="tab-btn" data-tab="prompt-craft" onclick="setTab(this,'active-craft')">Prompt craft</button>
  </div>
</div>

<main class="main" id="main"></main>

<script>
const PROMPTS = [
  /* ── PROMPT CRAFT ── */
  {
    tab:"prompt-craft", iconClass:"icon-craft", badge:"badge-craft", badgeLabel:"prompt craft",
    icon:"⟁",
    title:"Refine any rough prompt",
    desc:"Transform a vague idea into a sharp, structured, output-ready prompt.",
    template:`You are a senior prompt engineer. Take this rough prompt:

"[ROUGH PROMPT]"

Rewrite it to be:
1. Role-framed (assign an expert persona)
2. Context-rich (add missing background)
3. Output-constrained (specify format, length, tone)
4. Edge-case aware (add what to avoid)

Return ONLY the improved prompt. No explanation.`,
    examples:[
      { filled: "You are a prompt engineer. Take this rough prompt:\n\n\"Write code to scrape a website\"\n\nRewrite it to be clearer, more specific, and output-driven. Add role framing, constraints, and desired output format. Return the improved prompt only." }
    ]
  },
  {
    tab:"prompt-craft", iconClass:"icon-craft", badge:"badge-craft", badgeLabel:"prompt craft",
    icon:"⬡",
    title:"Prompt critique & fix",
    desc:"Get surgical feedback on any prompt before shipping it.",
    template:`Act as a prompt engineering expert. Audit this prompt:

---
[YOUR PROMPT]
---

Identify:
1. Ambiguities (what's unclear)
2. Missing constraints (what's not specified)
3. Missing context (what the model needs to know)
4. Likely failure modes (how this could go wrong)
5. Hallucination risks

Then rewrite the prompt to fix all issues. Show original vs improved side by side.`,
    examples:[
      { filled: "Act as a prompt engineering expert. Audit this prompt:\n\n---\nWrite a blog post about remote work\n---\n\nIdentify ambiguities, missing constraints, missing context, likely failure modes, and hallucination risks. Then rewrite the prompt to fix all issues." }
    ]
  },
  {
    tab:"prompt-craft", iconClass:"icon-craft", badge:"badge-craft", badgeLabel:"prompt craft",
    icon:"◎",
    title:"Chain-of-thought wrapper",
    desc:"Force step-by-step reasoning before any answer — reduces hallucinations.",
    template:`Before answering, reason through this carefully inside <thinking> tags:
- Break the problem into sub-problems
- Consider edge cases
- Check your assumptions
- Identify where you might be wrong

Then give your final, clean answer inside <answer> tags.

Task: [YOUR TASK HERE]`,
    examples:[
      { filled: "Before answering, reason through this carefully inside <thinking> tags. Break the problem into sub-problems, consider edge cases, check your assumptions, and identify where you might be wrong. Then give your final clean answer inside <answer> tags.\n\nTask: My React app re-renders 3x on every keystroke in a search input. How do I fix it?" }
    ]
  },
  {
    tab:"prompt-craft", iconClass:"icon-craft", badge:"badge-craft", badgeLabel:"prompt craft",
    icon:"◈",
    title:"Few-shot example generator",
    desc:"Auto-generate high-quality input/output pairs for any task.",
    template:`I'm building a few-shot prompt for this task:
"[TASK DESCRIPTION]"

Target model: [GPT-4 / Claude / Gemini]
Output format: [JSON / markdown / plain text / code]

Generate 5 diverse input/output example pairs. Requirements:
- Cover the happy path, edge cases, and failure modes
- Show the desired tone and format explicitly
- Make inputs realistic, not toy examples
- Output pairs as: Input: ... → Output: ...`,
    examples:[
      { filled: "I'm building a few-shot prompt for this task: 'Classify customer support tickets by urgency: critical, high, medium, low'\n\nTarget model: Claude\nOutput format: JSON\n\nGenerate 5 diverse input/output example pairs covering happy path, edge cases, and failure modes." }
    ]
  },
  {
    tab:"prompt-craft", iconClass:"icon-craft", badge:"badge-craft", badgeLabel:"prompt craft",
    icon:"⊞",
    title:"System prompt architect",
    desc:"Build a complete, production-ready system prompt for any AI persona.",
    template:`Design a production system prompt for an AI assistant with these specs:

Role: [JOB TITLE / PERSONA]
Product context: [WHAT PRODUCT THIS POWERS]
Primary user: [WHO WILL TALK TO IT]
Core behaviors: [3–5 KEY THINGS IT SHOULD DO]
Hard restrictions: [WHAT IT MUST NEVER DO]
Tone: [FORMAL / CASUAL / TECHNICAL / FRIENDLY]
Output format preference: [MARKDOWN / PLAIN / STRUCTURED]
Escalation rule: [WHAT TO DO WHEN UNSURE]

Output the system prompt directly. Use XML tags to separate sections if helpful.`,
    examples:[
      { filled: "Design a production system prompt for an AI assistant with these specs:\n\nRole: Senior code reviewer\nProduct context: In-IDE assistant for VS Code\nPrimary user: Mid-level developers shipping to production\nCore behaviors: Review for security, performance, readability; cite line numbers; explain the why behind every suggestion\nHard restrictions: Never rewrite entire files; never approve code with SQL injection risk; never skip security issues as 'minor'\nTone: Direct, technical, collegial\nOutput format: Markdown with severity tags" }
    ]
  },
  {
    tab:"prompt-craft", iconClass:"icon-craft", badge:"badge-craft", badgeLabel:"prompt craft",
    icon:"⟳",
    title:"Meta-prompt optimizer",
    desc:"Make your prompt iteratively better using the model itself.",
    template:`You are an expert at prompt optimization. Here is my current prompt and the output it's producing:

CURRENT PROMPT:
[YOUR PROMPT]

ACTUAL OUTPUT RECEIVED:
[PASTE THE BAD OUTPUT]

DESIRED OUTPUT INSTEAD:
[DESCRIBE OR PASTE IDEAL OUTPUT]

Diagnose what's causing the gap. Then give me 3 improved versions of the prompt, each taking a different approach (role-play, structured format, constraint-heavy). Rate each on precision and reliability.`,
    examples:[
      { filled: "CURRENT PROMPT: 'List 5 startup ideas'\n\nACTUAL OUTPUT RECEIVED: 'Here are 5 startup ideas: 1. An app for dog owners 2. A marketplace for freelancers 3. An AI writing tool 4. A food delivery app 5. A fitness tracker'\n\nDESIRED OUTPUT INSTEAD: Specific, non-obvious ideas with a clear problem, target customer, and monetization angle. Not generic categories.\n\nDiagnose the gap and give me 3 improved prompt versions." }
    ]
  },

  /* ── CODING & TECH ── */
  {
    tab:"coding", iconClass:"icon-code", badge:"badge-code", badgeLabel:"coding",
    icon:"⌘",
    title:"Vibe-code a feature",
    desc:"Describe a feature in plain English, get clean production-ready code.",
    template:`I'm building [APP NAME / DESCRIPTION].

Feature I want: [DESCRIBE WHAT IT SHOULD DO IN PLAIN ENGLISH]

Tech stack: [LANGUAGE, FRAMEWORK, DATABASE, etc.]
Constraints: [PERFORMANCE NEEDS / MUST NOT USE X / AUTH METHOD]
Style: follow [AIRBNB / GOOGLE / your existing conventions]

Write production-quality code with:
- Inline comments on non-obvious logic
- Input validation and error handling
- Edge cases handled
- TypeScript types / docstring (if applicable)

Don't write tests — just the implementation.`,
    examples:[
      { filled: "I'm building a SaaS dashboard app.\n\nFeature I want: A notification bell icon in the navbar that shows an unread count badge, opens a dropdown with the last 10 notifications, and marks them all as read when opened.\n\nTech stack: Next.js 14, TypeScript, Tailwind CSS, React Query\nConstraints: Must work with our existing /api/notifications endpoint\nStyle: follow Airbnb conventions" }
    ]
  },
  {
    tab:"coding", iconClass:"icon-code", badge:"badge-code", badgeLabel:"coding",
    icon:"⚡",
    title:"Deep debug",
    desc:"Systematic root-cause analysis + fix for any broken code.",
    template:`Here is my code that's failing:

\`\`\`[LANGUAGE]
[PASTE CODE]
\`\`\`

Error / unexpected behavior:
[DESCRIBE THE EXACT PROBLEM — include error message, stack trace if any]

Expected behavior:
[WHAT IT SHOULD DO]

What I've already tried:
[ANY FIXES ATTEMPTED]

Do this:
1. Identify the root cause (not symptoms)
2. Explain WHY it's failing
3. Show the corrected code with changed lines highlighted in comments
4. Mention any related issues I should watch for`,
    examples:[
      { filled: "Here is my code that's failing:\n\n```python\nasync def get_user_data(user_id):\n    conn = psycopg2.connect(DB_URL)\n    cursor = conn.cursor()\n    cursor.execute('SELECT * FROM users WHERE id = %s', (user_id,))\n    return cursor.fetchone()\n```\n\nError: The function hangs and never returns when called from FastAPI endpoints under load.\n\nExpected behavior: Should return user row quickly\nWhat I've tried: Added async/await, didn't help" }
    ]
  },
  {
    tab:"coding", iconClass:"icon-code", badge:"badge-code", badgeLabel:"coding",
    icon:"⟳",
    title:"Refactor for production",
    desc:"Clean, restructure, and harden messy code without touching behavior.",
    template:`Refactor this code for production readiness. Do NOT change functionality.

\`\`\`[LANGUAGE]
[PASTE CODE]
\`\`\`

Apply these improvements:
- Clean, intention-revealing names (no abbreviations)
- Single responsibility per function/class
- Remove redundancy and dead code
- Add comments only where logic is non-obvious
- Add input validation where missing
- Follow [STYLE GUIDE] conventions

Show me: original → refactored, with a bullet list of every change made and why.`,
    examples:[

let activeTab = "all";

function setTab(el, cls) {
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.className = "tab-btn";
  });
  el.className = "tab-btn " + cls;
  activeTab = el.dataset.tab;
  render();
}

function render() {
  const q = (document.getElementById("search").value || "").toLowerCase();
  const main = document.getElementById("main");

  const filtered = PROMPTS.filter(p => {
    const matchTab = activeTab === "all" || p.tab === activeTab;
    const matchQ = !q || p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.tab.includes(q) || p.template.toLowerCase().includes(q);
    return matchTab && matchQ;
  });

  if (!filtered.length) {
    main.innerHTML = `<div class="empty">No prompts found for "${q}" — try a different keyword.</div>`;
    return;
  }

  const tabOrder = ["prompt-craft","coding","productivity","creative"];
  const tabLabels = { "prompt-craft":"Prompt craft","coding":"Coding & tech","productivity":"Work & productivity","creative":"Creative projects" };
  const dotClass = { "prompt-craft":"dot-craft","coding":"dot-code","productivity":"dot-prod","creative":"dot-creative" };

  const grouped = {};
  tabOrder.forEach(t => { grouped[t] = []; });
  filtered.forEach(p => { if (grouped[p.tab]) grouped[p.tab].push(p); });

  let html = "";
  tabOrder.forEach(tab => {
    const items = grouped[tab];
    if (!items.length) return;
    html += `<div class="section-header">
      <div class="section-dot ${dotClass[tab]}"></div>
      <span class="section-name">${tabLabels[tab]}</span>
      <span class="section-count">${items.length} prompts</span>
    </div>
    <div class="card-grid">`;

    items.forEach((p, i) => {
      const id = p.id;
      const tpl = p.template.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\[([^\]]+)\]/g,'<span class="var">[$1]</span>');
      const examplesHtml = p.examples ? p.examples.map((e, ei) => {
        const filledEsc = e.filled.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        const filledKey = "ex_" + id + "_" + ei;
        EXAMPLE_MAP[filledKey] = e.filled;
        return "<div class=\"example-item\">"
          + "<div class=\"ex-input-block\">"
          + "<div class=\"ex-row-label input-lbl\" style=\"justify-content:space-between;\">"
          + "<span style=\"display:flex;align-items:center;gap:5px;\"><span class=\"ex-dot ex-dot-input\"></span>filled prompt</span>"
          + "<button class=\"ex-copy-btn\" onclick=\"copyEx('" + filledKey + "')\" >copy prompt</button>"
          + "</div>"
          + "<div class=\"ex-text\">" + filledEsc + "</div>"
          + "</div></div>";
      }).join("") : "";

      html += "<div class=\"prompt-card\">"
        + "<div class=\"card-header\">"
        + "<div class=\"card-icon " + p.iconClass + "\">" + p.icon + "</div>"
        + "<div class=\"card-meta\">"
        + "<div class=\"card-title\">" + p.title + "</div>"
        + "<div class=\"card-desc\">" + p.desc + "</div>"
        + "</div></div>"
        + "<div class=\"prompt-box\" id=\"box-" + id + "\">" + tpl + "</div>"
        + (p.examples ? "<div class=\"examples-section\" id=\"ex-" + id + "\">"
          + "<div class=\"examples-label\">how to use this prompt</div>"
          + examplesHtml + "</div>" : "")
        + "<div class=\"card-footer\">"
        + "<span class=\"badge " + p.badge + "\">" + p.badgeLabel + "</span>"
        + (p.examples ? "<button class=\"toggle-btn\" id=\"extoggle-" + id + "\" onclick=\"toggleEx('" + id + "')\">see example</button>" : "")
        + "<button class=\"action-btn\" onclick=\"toggleExpand('" + id + "')\">expand</button>"
        + "<button class=\"action-btn ml-auto\" id=\"btn-" + id + "\" onclick=\"copyPrompt('" + id + "')\">copy</button>"
        + "</div></div>";
    });
    html += `</div>`;
  });

  main.innerHTML = html;
}

function toggleExpand(id) {
  const box = document.getElementById("box-" + id);
  const btn = box ? box.closest(".prompt-card").querySelector(".action-btn") : null;
  if (!box) return;
  box.classList.toggle("expanded");
  if (btn) btn.textContent = box.classList.contains("expanded") ? "collapse" : "expand";
}

function toggleEx(id) {
  const ex = document.getElementById("ex-" + id);
  const btn = document.getElementById("extoggle-" + id);
  if (!ex) return;
  ex.classList.toggle("visible");
  if (btn) btn.textContent = ex.classList.contains("visible") ? "- examples" : "+ examples";
}

function copyPrompt(id, text) {
  const template = text !== undefined ? text : PROMPT_MAP[id];
  navigator.clipboard.writeText(template).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = template;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  });
  const btn = document.getElementById("btn-" + id);
  if (!btn) return;
  btn.textContent = "copied!";
  btn.classList.add("copied");
  setTimeout(() => { btn.textContent = "copy"; btn.classList.remove("copied"); }, 1800);
}


const PROMPT_MAP = {};
const EXAMPLE_MAP = {};
PROMPTS.forEach((p, i) => { 
  p.id = "p_" + i;
  PROMPT_MAP[p.id] = p.template; 
});

function copyEx(key) {
  const text = EXAMPLE_MAP[key];
  if (!text) return;
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
  const btns = document.querySelectorAll('.ex-copy-btn');
  btns.forEach(b => { if (b.getAttribute('onclick') === "copyEx('" + key + "')") {
    b.textContent = 'copied!'; b.style.color = '#3ecf8e'; b.style.borderColor = '#3ecf8e';
    setTimeout(() => { b.textContent = 'copy prompt'; b.style.color = ''; b.style.borderColor = ''; }, 1800);
  }});
}

render();
</script>
